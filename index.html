<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Swiftly. | Pavanbhagi</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-glass: rgba(255, 255, 255, 0.7);
            --apple-border: rgba(0, 0, 0, 0.08);
            --apple-text: #1D1D1F;
            --apple-blue: #0071E3;
            --apple-dim: #86868b;
        }

        [data-theme="dark"] {
            --apple-bg: #000000;
            --apple-glass: rgba(28, 28, 30, 0.85);
            --apple-border: rgba(255, 255, 255, 0.12);
            --apple-text: #F5F5F7;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Dock */
        .dock-wrapper {
            position: fixed;
            left: 20px;
            top: 120px;
            bottom: 40px;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .dock-container {
            background: var(--apple-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--apple-border);
            border-radius: 22px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            max-height: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .dock-container::-webkit-scrollbar { width: 3px; }
        .dock-container::-webkit-scrollbar-thumb { background: var(--apple-border); border-radius: 10px; }

        .dock-icon {
            width: 44px;
            height: 44px;
            min-height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0,0,0,0.03);
            color: var(--apple-text);
        }

        .dock-icon:hover { transform: scale(1.1); background: var(--apple-blue); color: white; }
        .dock-icon.active { background: var(--apple-text); color: var(--apple-bg); }

        .timeline-path {
            position: fixed;
            left: 110px;
            top: 0;
            width: 1px;
            height: 100vh;
            background: linear-gradient(to bottom, transparent, var(--apple-border), transparent);
            z-index: 1;
        }

        .main-content { 
            margin-left: 160px;
            max-width: 800px; 
            padding: 0 40px 100px; 
            position: relative;
            z-index: 2;
        }

        .hero { padding: 100px 0 60px; text-align: left; }
        .hero h1 { font-size: 4.5rem; font-weight: 800; margin: 0; letter-spacing: -0.04em; }
        .hero h1 span { font-weight: 200; color: var(--apple-dim); }
        .hero p { font-size: 1.4rem; color: var(--apple-dim); margin-top: 10px; }

        .apple-card {
            background: var(--apple-glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--apple-border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
        }

        .module-indicator {
            position: absolute;
            left: -140px;
            width: 100px;
            text-align: right;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--apple-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 10px;
        }

        .editor-container {
            margin-top: 25px;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--apple-border);
            background: #fff;
        }

        .CodeMirror { height: auto; font-family: "SF Mono", monospace; font-size: 14px; padding: 20px; }

        .action-bar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            background: rgba(0,0,0,0.01);
            border-top: 1px solid var(--apple-border);
        }

        .apple-btn {
            background: var(--apple-text);
            color: var(--apple-bg);
            border: none;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .apple-btn:hover { transform: scale(1.05); }

        .terminal {
            background: #000;
            color: #fff;
            padding: 20px;
            border-radius: 0 0 18px 18px;
            font-family: "SF Mono", monospace;
            display: none;
            font-size: 0.85rem;
        }

        .theme-pill {
            position: fixed;
            top: 30px;
            right: 40px;
            background: var(--apple-glass);
            border: 1px solid var(--apple-border);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            z-index: 2000;
            font-size: 0.8rem;
        }
    </style>
</head>
<body data-theme="light">

<button class="theme-pill" onclick="toggleTheme()">Appearance</button>

<div class="timeline-path"></div>

<div class="dock-wrapper">
    <nav class="dock-container" id="side-dock"></nav>
</div>

<main class="main-content">
    <header class="hero">
        <h1>Code <span>Swiftly.</span></h1>
        <p>The Python Roadmap.</p>
    </header>
    
    <div id="master-flow"></div>
</main>

<script>
    const pythonModules = [
        { id: 1, name: "Intro", code: "print('Welcome to Code Swiftly.')" },
        { id: 2, name: "Data", code: "msg = 'Swift Learning'\nprint(msg.upper())" },
        { id: 3, name: "Lists", code: "items = ['Code', 'Swiftly']\nprint(items[1])" },
        { id: 4, name: "Maps", code: "d = {'day': 4}\nprint(f'Progress: {d}')" },
        { id: 5, name: "Logic", code: "try:\n    print(10/0)\nexcept:\n    print('Safety First.')" },
        { id: 6, name: "I/O", code: "print('Disk Access Ready.')" },
        { id: 7, name: "Blueprint", code: "class Swift: pass\nprint('OOP Active')" },
        { id: 8, name: "Standard", code: "import math\nprint(math.pi)" },
        { id: 9, name: "Functions", code: "def run(): print('Fired')\nrun()" },
        { id: 10, name: "Iterable", code: "print([x for x in range(3)])" },
        { id: 11, name: "Yields", code: "def g(): yield 'OK'\nprint(next(g()))" },
        { id: 12, name: "Wrappers", code: "print('Decorators Ready')" },
        { id: 13, name: "Closure", code: "print('Cleanup Managed')" },
        { id: 14, name: "Web Data", code: "import json\nprint(json.dumps({'id':1}))" },
        { id: 15, name: "Lambdas", code: "f = lambda x: x*2\nprint(f(8))" },
        { id: 16, name: "Filters", code: "print(list(map(str, [1,2])))" },
        { id: 17, name: "Regex", code: "import re\nprint(re.search('S', 'Swift'))" },
        { id: 18, name: "Temporal", code: "from datetime import datetime\nprint(datetime.now())" },
        { id: 19, name: "Scraper", code: "print('Extraction engine live.')" },
        { id: 20, name: "Environments", code: "import sys\nprint(f'Venv: {sys.prefix}')" },
        { id: 21, name: "Networking", code: "print('GET Request Ready.')" },
        { id: 22, name: "Auth", code: "print('Headers & Bearer Tokens active.')" },
        { id: 23, name: "POST Payloads", code: "print('Data Packaged and Sent.')" },
        { id: 24, name: "Resilience", code: "import time\n\ndef fetch_with_retry(url, retries=3):\n    for i in range(retries):\n        try:\n            print(f'Attempt {i+1}: Connecting...')\n            # Simulating a timeout error\n            if i < 2: raise ConnectionError('Timeout') \n            return 'Success: Data Fetched'\n        except Exception as e:\n            print(f'Warning: {e}. Retrying...')\n            time.sleep(0.1)\n    return 'Error: Site Unreachable'\n\nprint(fetch_with_retry('https://api.codeswiftly.io'))" }
    ];

    let pyodide;
    const editors = {};

    async function start() {
        pyodide = await loadPyodide();
        build();
        gsap.to(".apple-card", { opacity: 1, y: 0, duration: 1, stagger: 0.1, ease: "power4.out" });
    }

    function build() {
        const dock = document.getElementById('side-dock');
        const flow = document.getElementById('master-flow');

        pythonModules.forEach(m => {
            const icon = document.createElement('div');
            icon.className = 'dock-icon';
            icon.innerText = m.id;
            icon.onclick = () => {
                document.getElementById(`day-${m.id}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                document.querySelectorAll('.dock-icon').forEach(i => i.classList.remove('active'));
                icon.classList.add('active');
            };
            dock.appendChild(icon);

            const card = document.createElement('div');
            card.className = 'apple-card';
            card.id = `day-${m.id}`;
            card.innerHTML = `
                <div class="module-indicator">Day ${m.id}</div>
                <h2 style="margin:0; font-weight:700">${m.name}</h2>
                <div class="editor-container">
                    <textarea id="edit-${m.id}">${m.code}</textarea>
                    <div class="action-bar">
                        <button class="apple-btn" onclick="runCode(${m.id})">Execute</button>
                    </div>
                    <div class="terminal" id="term-${m.id}"></div>
                </div>
            `;
            flow.appendChild(card);

            editors[m.id] = CodeMirror.fromTextArea(document.getElementById(`edit-${m.id}`), {
                mode: "python",
                lineNumbers: false,
                theme: "neo"
            });
        });
    }

    async function runCode(id) {
        const term = document.getElementById(`term-${id}`);
        term.style.display = "block";
        term.innerText = "System: Initializing Resilient Protocol...";
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editors[id].getValue());
            term.innerText = pyodide.runPython("sys.stdout.getvalue()") || "Finished.";
        } catch (e) { term.innerText = e.message; }
    }

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
    }

    start();
</script>
</body>
</html>
