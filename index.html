<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mastery | Pavanbhagi</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent: #FFD700;
            --bg-main: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
        }

        [data-theme="dark"] {
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-main: #000000;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            scroll-behavior: smooth;
        }

        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            max-width: 1400px;
            margin: 0 auto;
            gap: 40px;
            padding: 40px;
        }

        /* Sidebar Navigation */
        .sidebar {
            position: sticky;
            top: 40px;
            height: calc(100vh - 80px);
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Hide scrollbar for sidebar */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .nav-list { list-style: none; padding: 0; margin: 20px 0; }
        
        .nav-item {
            padding: 10px 16px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item:hover { background: var(--glass-bg); color: var(--text-primary); }
        .nav-item.active { background: var(--accent); color: #000; font-weight: 700; }

        /* Content Cards */
        .day-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
        }

        .badge { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }

        .editor-container {
            border-radius: 16px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid var(--glass-border);
            background: #fff;
        }

        .CodeMirror { height: auto; font-size: 14px; }

        .toolbar { display: flex; justify-content: flex-end; padding: 10px 20px; background: rgba(0,0,0,0.03); border-top: 1px solid var(--glass-border); }

        .run-btn { background: var(--accent); border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .console-box {
            background: #000;
            color: #4ade80;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            display: none;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body data-theme="light">

<div class="app-container">
    <aside class="sidebar">
        <h2 style="margin:0">Py<span>30</span></h2>
        <div class="nav-list" id="sidebar-nav">
            </div>
        <button onclick="toggleTheme()" class="run-btn" style="width:100%; margin-top: 20px;">🌓 Theme</button>
    </aside>

    <main class="content">
        <div id="day-container">
            </div>
    </main>
</div>

<script>
    const dayData = [
        { id: 1, title: "Hello World", cat: "Basics", code: "print('Welcome to Python!')" },
        { id: 2, title: "Variables & Strings", cat: "Basics", code: "name = 'Pavan'\nprint(f'Hello {name}')" },
        { id: 3, title: "Lists", cat: "Data", code: "items = ['Code', 'Eat', 'Sleep']\nprint(items[0])" },
        { id: 4, title: "Dictionaries", cat: "Data", code: "user = {'id': 1, 'role': 'Admin'}\nprint(user.get('role'))" },
        { id: 5, title: "Error Handling", cat: "Logic", code: "try:\n    res = 10 / 0\nexcept Exception as e:\n    print(f'Error: {e}')" },
        { id: 6, title: "File Operations", cat: "I/O", code: "print('File management system ready.')" },
        { id: 7, title: "Classes & Objects", cat: "OOP", code: "class Dev:\n    def work(self): print('Coding...')\nDev().work()" },
        { id: 8, title: "Modules", cat: "Tools", code: "import math\nprint(math.sqrt(64))" },
        { id: 9, title: "Functions", cat: "Core", code: "def add(a, b): return a + b\nprint(add(5, 10))" },
        { id: 10, title: "List Comprehension", cat: "Logic", code: "print([x*x for x in range(5)])" },
        { id: 11, title: "Generators", cat: "Memory", code: "def g(): yield 'Ready'\nprint(next(g()))" },
        { id: 12, title: "Decorators", cat: "Wrappers", code: "def bold(f):\n    return lambda: f'<b>{f()}</b>'\n@bold\ndef hi(): return 'Hi'\nprint(hi())" },
        { id: 13, title: "Context Managers", cat: "Safety", code: "with open('t.txt', 'w') as f: f.write('OK')\nprint('Done')" },
        { id: 14, title: "JSON Data", cat: "API", code: "import json\nprint(json.dumps({'status': 200}))" },
        { id: 15, title: "Lambda Functions", cat: "Shortcuts", code: "mul = lambda x, y: x * y\nprint(mul(4, 5))" },
        { id: 16, title: "Map & Filter", cat: "Data Science", code: "n = [1, 2, 3]\nprint(list(map(lambda x: x+1, n)))" },
        { id: 17, title: "Regex", cat: "Patterns", code: "import re\nprint(re.findall(r'\\d+', 'Day 17'))" },
        { id: 18, title: "Datetimes", cat: "Time", code: "from datetime import datetime\nprint(datetime.now())" },
        { id: 19, title: "Web Scraping", cat: "Extraction", code: "html = '<h1>Title</h1>'\nprint(html[4:-5])" }
    ];

    let pyodide;
    const editors = {};

    async function init() {
        pyodide = await loadPyodide();
        renderContent();
        
        // GSAP Stagger Entrance
        gsap.to(".day-card", {
            opacity: 1,
            y: 0,
            duration: 0.8,
            stagger: 0.1,
            ease: "power2.out"
        });
    }

    function renderContent() {
        const nav = document.getElementById('sidebar-nav');
        const container = document.getElementById('day-container');

        dayData.reverse().forEach(day => {
            // Sidebar Items
            const navItem = document.createElement('div');
            navItem.className = 'nav-item';
            navItem.innerText = `Day ${day.id}: ${day.title}`;
            navItem.onclick = () => scrollToDay(day.id, navItem);
            nav.appendChild(navItem);

            // Day Cards
            const card = document.createElement('div');
            card.className = 'day-card';
            card.id = `day-${day.id}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <span class="badge">${day.cat}</span>
                    <span style="color:var(--text-secondary); font-size:0.8rem">DAY ${day.id}</span>
                </div>
                <h2>${day.title}</h2>
                <div class="editor-container">
                    <textarea id="editor-${day.id}">${day.code}</textarea>
                    <div class="toolbar">
                        <button class="run-btn" onclick="runCode(${day.id})">Run Script</button>
                    </div>
                    <div class="console-box" id="output-${day.id}"></div>
                </div>
            `;
            container.appendChild(card);

            // Init CodeMirror for each
            editors[day.id] = CodeMirror.fromTextArea(document.getElementById(`editor-${day.id}`), {
                mode: "python",
                theme: document.body.dataset.theme === "dark" ? "dracula" : "default",
                lineNumbers: true,
                indentUnit: 4
            });
        });
    }

    function scrollToDay(id, element) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        document.getElementById(`day-${id}`).scrollIntoView({ behavior: 'smooth' });
    }

    async function runCode(id) {
        const out = document.getElementById(`output-${id}`);
        out.style.display = "block";
        out.innerText = "Running...";
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editors[id].getValue());
            out.innerText = pyodide.runPython("sys.stdout.getvalue()") || "Finished.";
        } catch (e) {
            out.innerText = `Error: ${e.message}`;
        }
    }

    function toggleTheme() {
        const body = document.body;
        body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
        Object.values(editors).forEach(ed => {
            ed.setOption("theme", body.dataset.theme === "dark" ? "dracula" : "default");
        });
    }

    init();
</script>
</body>
</html>
