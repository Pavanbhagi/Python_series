<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Swiftly. | Pavanbhagi</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-glass: rgba(255, 255, 255, 0.7);
            --apple-border: rgba(0, 0, 0, 0.08);
            --apple-text: #1D1D1F;
            --apple-blue: #0071E3;
            --apple-dim: #86868b;
        }

        [data-theme="dark"] {
            --apple-bg: #000000;
            --apple-glass: rgba(28, 28, 30, 0.85);
            --apple-border: rgba(255, 255, 255, 0.12);
            --apple-text: #F5F5F7;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            transition: background 0.5s ease;
        }

        /* Sidebar Dock */
        .dock-wrapper {
            position: fixed;
            left: 20px;
            top: 120px;
            bottom: 40px;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .dock-container {
            background: var(--apple-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--apple-border);
            border-radius: 22px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            max-height: 100%;
            scrollbar-width: none;
        }
        .dock-container::-webkit-scrollbar { display: none; }

        .dock-icon {
            width: 44px;
            height: 44px;
            min-height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0,0,0,0.03);
            color: var(--apple-text);
        }

        .dock-icon:hover { transform: scale(1.2) translateY(-5px); background: var(--apple-blue); color: white; }

        .main-content { 
            margin-left: 160px;
            max-width: 800px; 
            padding: 0 40px 100px; 
        }

        /* Apple Cards */
        .apple-card {
            background: var(--apple-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--apple-border);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        .module-indicator {
            position: absolute;
            left: -140px;
            width: 100px;
            text-align: right;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--apple-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .editor-container {
            margin-top: 25px;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--apple-border);
            background: #fff;
        }

        .CodeMirror { height: auto; font-family: "SF Mono", monospace; font-size: 14px; padding: 20px; }

        .apple-btn {
            background: var(--apple-text);
            color: var(--apple-bg);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .apple-btn:hover { opacity: 0.8; transform: scale(1.02); }

        .terminal {
            background: #000;
            color: #50fa7b;
            padding: 20px;
            border-radius: 0 0 18px 18px;
            font-family: "SF Mono", monospace;
            display: none;
            font-size: 0.85rem;
            white-space: pre-wrap;
        }

        .theme-pill {
            position: fixed;
            top: 30px;
            right: 40px;
            background: var(--apple-glass);
            border: 1px solid var(--apple-border);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 2000;
            font-weight: 500;
        }
    </style>
</head>
<body data-theme="light">

<button class="theme-pill" onclick="toggleTheme()">Appearance</button>

<div class="dock-wrapper">
    <nav class="dock-container" id="side-dock"></nav>
</div>

<main class="main-content">
    <header style="padding: 100px 0 60px;">
        <h1 style="font-size: 4.5rem; margin: 0; letter-spacing: -3px; font-weight: 700;">Code Swiftly.</h1>
        <p id="engine-status" style="color: var(--apple-dim); font-size: 1.2rem;">Wasm Python Engine initializing...</p>
    </header>
    <div id="master-flow"></div>
</main>

<script>
    const pythonModules = [
        { id: 1, name: "Intro", code: "print('Welcome to Code Swiftly.')\nprint('Python is running natively in your browser.')" },
        { id: 2, name: "Data", code: "name = 'Swift'\nversion = 3.0\nprint(f'{name} v{version} active.')" },
        { id: 3, name: "Lists", code: "items = ['Clean Code', 'Wasm', 'UX']\nitems.append('GSAP')\nprint(f'Tech Stack: {items}')" },
        { id: 4, name: "Maps", code: "d = {'day': 4, 'status': 'learning'}\nprint(f'Progress: {d}')" },
        { id: 5, name: "Logic", code: "try:\n    print(10/0)\nexcept ZeroDivisionError:\n    print('Safety protocols active.')" },
        { id: 6, name: "I/O", code: "print('Simulating file system access...')\nprint('Buffer stream secured.')" },
        { id: 7, name: "Blueprint", code: "class Dev:\n    def __init__(self): self.level = 'Senior'\n\nprint(f'Skill Level: {Dev().level}')" },
        { id: 8, name: "Math", code: "import math\nprint(f'PI Calculation: {math.pi}')" },
        { id: 9, name: "Functions", code: "def run(): return 'Success'\nprint(run())" },
        { id: 10, name: "Iterable", code: "print([x*x for x in range(5)])" },
        { id: 11, name: "Yields", code: "def g():\n    yield 'A'\n    yield 'B'\nprint(next(g()))" },
        { id: 12, name: "Wrappers", code: "def dec(f): return lambda: f'[{f()}]'\n@dec\ndef app(): return 'Swift'\nprint(app())" },
        { id: 13, name: "Closure", code: "def outer(n):\n    return lambda: n + 1\nprint(outer(25)())" },
        { id: 14, name: "Web Data", code: "import json\nprint(json.dumps({'engine': 'Wasm'}))" },
        { id: 15, name: "Lambdas", code: "f = lambda x: x**2\nprint(f(8))" },
        { id: 16, name: "Filters", code: "nums = [1, 2, 3, 4, 5]\nprint(list(filter(lambda x: x > 3, nums)))" },
        { id: 17, name: "Regex", code: "import re\nprint(re.search('Swift', 'Code Swiftly').group())" },
        { id: 18, name: "Temporal", code: "from datetime import datetime\nprint(datetime.now())" },
        { id: 19, name: "Scraper", code: "print('Extraction live...')\nprint('Status: 200 OK')" },
        { id: 20, name: "System", code: "import sys\nprint(sys.version)" },
        { id: 21, name: "Networking", code: "print('GET Request Ready.')" },
        { id: 22, name: "Auth", code: "print('Bearer Token active.')" },
        { id: 23, name: "POST", code: "print('Data Transmitted.')" },
        { id: 24, name: "Resilience", code: "print('Retry logic ready.')" },
        { id: 25, name: "Asynchrony", code: "import asyncio\n\nasync def fetch():\n    print('Task started...')\n    await asyncio.sleep(0.5)\n    print('Task finished.')\n\n# Pyodide special execution\nimport pyodide_js\nawait fetch()" },
        { id: 26, name: "Performance", code: "import time\nstart = time.time()\n_ = [x for x in range(10000)]\nprint(f'Benchmark: {time.time()-start:.6f}s')\nprint('Roadmap Complete.')" }
    ];

    let pyodide;
    const editors = {};

    async function start() {
        try {
            pyodide = await loadPyodide();
            document.getElementById('engine-status').innerText = "Python 3.11 (WebAssembly) Engine Live.";
            build();
            gsap.to(".apple-card", { opacity: 1, y: 0, duration: 1, stagger: 0.1, ease: "expo.out" });
        } catch (e) {
            document.getElementById('engine-status').innerText = "Engine Load Failed.";
        }
    }

    function build() {
        const dock = document.getElementById('side-dock');
        const flow = document.getElementById('master-flow');

        pythonModules.forEach(m => {
            const icon = document.createElement('div');
            icon.className = 'dock-icon';
            icon.innerText = m.id;
            icon.onclick = () => document.getElementById(`day-${m.id}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            dock.appendChild(icon);

            const card = document.createElement('div');
            card.className = 'apple-card';
            card.id = `day-${m.id}`;
            card.innerHTML = `
                <div class="module-indicator">Day ${m.id}</div>
                <h2 style="margin:0; font-weight: 600;">${m.name}</h2>
                <div class="editor-container">
                    <textarea id="edit-${m.id}">${m.code}</textarea>
                    <div style="padding: 15px; border-top: 1px solid var(--apple-border); text-align: right;">
                        <button class="apple-btn" onclick="runCode(${m.id})">Execute</button>
                    </div>
                    <div class="terminal" id="term-${m.id}"></div>
                </div>
            `;
            flow.appendChild(card);
            
            editors[m.id] = CodeMirror.fromTextArea(document.getElementById(`edit-${m.id}`), {
                mode: "python",
                theme: "neo",
                lineNumbers: false,
                autoCloseBrackets: true
            });
        });
    }

    async function runCode(id) {
        const term = document.getElementById(`term-${id}`);
        term.style.display = "block";
        term.innerText = "Running...";
        
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            const code = editors[id].getValue();
            await pyodide.runPythonAsync(code);
            const output = pyodide.runPython("sys.stdout.getvalue()");
            term.innerText = output || "Process complete.";
            term.style.color = "#50fa7b";
        } catch (e) {
            term.innerText = "Error: " + e.message;
            term.style.color = "#ff5555";
        }
    }

    function toggleTheme() {
        const body = document.body;
        const current = body.dataset.theme;
        const next = current === "dark" ? "light" : "dark";
        body.dataset.theme = next;
        const theme = next === "dark" ? "dracula" : "neo";
        Object.values(editors).forEach(ed => ed.setOption("theme", theme));
    }

    start();
</script>
</body>
</html>
